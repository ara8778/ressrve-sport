<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رزرو اسپورت | پلتفرم مدرن اماکن ورزشی</title>
    
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.0.0/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: [ 'Shabnam', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#ecfeff',
                            100: '#cffafe',
                            200: '#a5f3fc',
                            300: '#67e8f9',
                            400: '#22d3ee',
                            500: '#06b6d4', 
                            600: '#0891b2',
                            700: '#0e7490',
                            800: '#155e75',
                            900: '#164e63',
                            950: '#083344',
                        },
                        dark: {
                            bg: '#050913', 
                            card: '#0c1222',
                            border: '#1e293b'
                        }
                    },
                    boxShadow: {
                        'glow': '0 0 25px rgba(6, 182, 212, 0.45)',
                        'glow-success': '0 0 20px rgba(34, 197, 94, 0.4)',
                        'glow-subtle': '0 0 15px rgba(6, 182, 212, 0.15)',
                        'glass': '0 8px 32px 0 rgba(0, 0, 0, 0.5)',
                    }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <style>
        body { font-family: 'Vazirmatn', 'Shabnam', sans-serif; background-color: #f8fafc; color: #0f172a; overflow-x: hidden; transition: background-color 0.5s ease, color 0.5s ease; }
        html.dark body { background-color: #050913; color: #f8fafc; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes floatSlow1 { 0% { transform: translateY(0px) translateX(0px) rotate(0deg); } 50% { transform: translateY(-20px) translateX(15px) rotate(180deg); } 100% { transform: translateY(0px) translateX(0px) rotate(360deg); } }
        @keyframes floatSlow2 { 0% { transform: translateY(0px) translateX(0px) rotate(360deg); } 50% { transform: translateY(15px) translateX(-25px) rotate(180deg); } 100% { transform: translateY(0px) translateX(0px) rotate(0deg); } }
        @keyframes floatIconLeft1 { 0%, 100% { transform: translateY(0px) rotate(0deg) scale(1); } 50% { transform: translateY(-15px) rotate(8deg) scale(1.05); } }
        @keyframes floatIconLeft2 { 0%, 100% { transform: translateY(0px) rotate(0deg) scale(0.95); } 50% { transform: translateY(-25px) rotate(-12deg) scale(1.02); } }
        @keyframes floatIconRight1 { 0%, 100% { transform: translateY(0px) rotate(0deg) scale(1); } 50% { transform: translateY(-18px) rotate(-8deg) scale(1.04); } }
        @keyframes floatIconRight2 { 0%, 100% { transform: translateY(0px) rotate(0deg) scale(0.95); } 50% { transform: translateY(-22px) rotate(15deg) scale(1.01); } }
        .animate-fade-up { animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .animate-fade { animation: fadeIn 1s ease-out forwards; opacity: 0; }
        .anim-icon-l1 { animation: floatIconLeft1 6s ease-in-out infinite; }
        .anim-icon-l2 { animation: floatIconLeft2 8s ease-in-out infinite; }
        .anim-icon-l3 { animation: floatIconLeft1 7s ease-in-out infinite; animation-delay: 1.5s; }
        .anim-icon-l4 { animation: floatIconLeft2 9s ease-in-out infinite; animation-delay: 0.5s; }
        .anim-icon-r1 { animation: floatIconRight1 6.5s ease-in-out infinite; }
        .anim-icon-r2 { animation: floatIconRight2 7.5s ease-in-out infinite; }
        .anim-icon-r3 { animation: floatIconRight1 8.5s ease-in-out infinite; animation-delay: 1s; }
        .anim-icon-r4 { animation: floatIconRight2 6.8s ease-in-out infinite; animation-delay: 2s; }
        .delay-100 { animation-delay: 100ms; } .delay-200 { animation-delay: 200ms; } .delay-300 { animation-delay: 300ms; } .delay-400 { animation-delay: 400ms; }
        .glass-panel { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(0, 0, 0, 0.05); transition: all 0.5s ease; }
        html.dark .glass-panel { background: rgba(12, 18, 34, 0.8); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border: 1px solid rgba(0, 0, 0, 0.05); transition: all 0.5s ease; }
        html.dark .glass-card { background: rgba(12, 18, 34, 0.55); border: 1px solid rgba(255, 255, 255, 0.04); }
        ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; } html.dark ::-webkit-scrollbar-thumb { background: #1e293b; } ::-webkit-scrollbar-thumb:hover { background: #06b6d4; }
        .fade-slide-enter-active, .fade-slide-leave-active { transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .fade-slide-enter-from { opacity: 0; transform: translateY(20px); } .fade-slide-leave-to { opacity: 0; transform: translateY(-20px); }
        .dropdown-enter-active, .dropdown-leave-active { transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1); }
        .dropdown-enter-from, .dropdown-leave-to { opacity: 0; transform: translateY(-10px) scale(0.96); }
        .drawer-slide-enter-active, .drawer-slide-leave-active { transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .drawer-slide-enter-from, .drawer-slide-leave-to { transform: translateX(100%); }
        .status-pulse { position: relative; display: inline-block; width: 8px; height: 8px; background-color: #10b981; border-radius: 50%; }
        .status-pulse::after { content: ''; position: absolute; width: 100%; height: 100%; top: 0; left: 0; background-color: #10b981; border-radius: 50%; animation: pulse-ring 1.5s cubic-bezier(0.215, 0.610, 0.355, 1) infinite; }
        @keyframes pulse-ring { 0% { transform: scale(0.5); opacity: 0.8; } 80%, 100% { transform: scale(2.5); opacity: 0; } }
        .nav-link { position: relative; padding-bottom: 2px; }
        .nav-link::after { content: ''; position: absolute; bottom: -6px; right: 0; width: 0; height: 2px; background: linear-gradient(to left, #06b6d4, #22d3ee); border-radius: 9999px; transition: width 0.7s cubic-bezier(0.16, 1, 0.3, 1); }
        .nav-link:hover::after, .nav-link-active::after { width: 100%; }
        .bg-grid-pattern { background-image: radial-gradient(rgba(6, 182, 212, 0.12) 1px, transparent 1px); background-size: 24px 24px; }
        @keyframes shimmer { 100% { transform: translateX(100%); } }
        .shimmer-btn::after { content: ''; position: absolute; top: 0; right: 0; bottom: 0; left: 0; transform: translateX(-100%); background-image: linear-gradient( 90deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.15) 20%, rgba(255, 255, 255, 0.3) 60%, rgba(255, 255, 255, 0) 100% ); animation: shimmer 3s infinite; }
        .social-btn-hover:hover { box-shadow: 0 0 15px rgba(6, 182, 212, 0.15); border-color: rgba(6, 182, 212, 0.3); }

        /* ======================================================= */
        /* استایل‌های اختصاصی و ترانزیشن انیمیشن لودینگ سراسری هولوگرافیک */
        /* ======================================================= */
        .fade-enter-active, .fade-leave-active {
            transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1), transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .fade-enter-from, .fade-leave-to {
            opacity: 0;
            backdrop-filter: blur(0px);
            -webkit-backdrop-filter: blur(0px);
        }
        
        /* انیمیشن پالس ملایم همراه با افکت تابش نوری برای لوگوی لودینگ شما */
        @keyframes loadingPulseGlow {
            0%, 100% {
                transform: scale(1) rotate(0deg);
                filter: drop-shadow(0 0 15px rgba(34, 211, 238, 0.4));
            }
            50% {
                transform: scale(1.08) rotate(3deg);
                filter: drop-shadow(0 0 30px rgba(34, 211, 238, 0.75));
            }
        }
        .animate-loading-pulse {
            animation: loadingPulseGlow 3s ease-in-out infinite;
        }
    </style>
</head>
<body class="antialiased selection:bg-brand-500 selection:text-white transition-colors duration-500">

<div id="app" class="min-h-screen flex flex-col justify-between" @click="closeAllDropdowns">
    <!-- نمایش پاپ‌آب لودینگ سراسری در صورت فعال بودن فلگ isLoading در استور -->
    <transition name="fade">
        <loading-view v-if="isLoading" key="global-loader"></loading-view>
    </transition>

    <div>
        <app-navbar></app-navbar>

        <transition name="fade-slide" mode="out-in">
            <home-view v-if="currentView === 'home'" key="home"></home-view>
            <results-view v-else-if="currentView === 'results'" key="results"></results-view>
            <auth-view v-else-if="currentView === 'auth'" key="auth"></auth-view>
            <pro-search-view v-else-if="currentView === 'pro-search'"></pro-search-view>
            <venue-detail-view v-else-if="currentView === 'venue-detail'" key="venue-detail"></venue-detail-view>
            <dashboard-view v-else-if="currentView === 'dashboard'" key="dashboard"></dashboard-view>
            <contact-view v-else-if="currentView === 'contact'" key="contact"></contact-view> 
            <about-view v-else-if="currentView === 'about'" key="about"></about-view>
            <faq-view v-else-if="currentView === 'faq'" key="faq"></faq-view>
            <error-view v-else-if="currentView === 'error'" key="error"></error-view>
            <error-test-view v-else-if="currentView === 'error-test'" key="error-test"></error-test-view>
        </transition>
    </div>

    <booking-modal></booking-modal>
    <toast-list></toast-list>
    <app-footer></app-footer>
</div>

<script type="module">
    // ایمپورت‌های اصلی سیستم و استور سراسری برنامه رزرو اسپورت
    import { store, closeAllDropdowns, applyFilters } from './components/store.js';
    
    // ایمپورت کامپوننت لودینگ سفارشی با انیمیشن مدرن و تصاویر اختصاصی
    import LoadingView from './components/LoadingView.js';
    
    import AppNavbar from './components/AppNavbar.js';
    import HomeView from './components/HomeView.js';
    import ResultsView from './components/ResultsView.js';
    import AuthView from './components/AuthView.js';
    import VenueDetailView from './components/VenueDetailView.js';
    import DashboardView from './components/DashboardView.js';
    import BookingModal from './components/BookingModal.js';
    import ToastList from './components/ToastList.js';
    import AppFooter from './components/AppFooter.js';
    import ProSearch from './components/ProSearch.js';
    import RegisterVenue from './components/RegisterVenue.js';
    import ContactView from './components/ContactView.js';
    import AboutView from './components/AboutView.js';
    import FaqView from './components/Faq.js';
    import ErrorView from './components/ErrorView.js';

    const { createApp, toRefs, onMounted } = window.Vue;

    const app = createApp({
        setup() {
            onMounted(() => {
                if(store.isDark) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
                applyFilters();
            });

            return {
                ...toRefs(store),
                closeAllDropdowns
            }
        }
    });

    // ثبت و معرفی کامپوننت لودینگ سفارشی در اپلیکیشن Vue
    app.component('loading-view', LoadingView);

    app.component('app-navbar', AppNavbar);
    app.component('home-view', HomeView);
    app.component('results-view', ResultsView);
    app.component('auth-view', AuthView);
    app.component('venue-detail-view', VenueDetailView);
    app.component('dashboard-view', DashboardView);
    app.component('booking-modal', BookingModal);
    app.component('toast-list', ToastList);
    app.component('app-footer', AppFooter);
    app.component('pro-search-view', ProSearch);
    app.component('register-venue', RegisterVenue);
    app.component('contact-view', ContactView);
    app.component('about-view', AboutView);
    app.component('faq-view', FaqView);
    app.component('error-view', ErrorView);

    app.mount('#app');
</script>

</body>
</html>
